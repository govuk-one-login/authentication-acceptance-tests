name: Build and Push Acceptance Tests to DEV

env:
  AWS_REGION: eu-west-2
  DEV_GHA_DEPLOYER_ROLE: arn:aws:iam::975050272416:role/authdev1-frontend-pipeline-GitHubActionsRole-YQ67Wx0O0KER
  DEV_ACCEPTANCE_ECR_REPO: authdev1-acceptance-test-image-repository-testrunnerimagerepository-hnixp5u7ymcj
  CONTAINER_SIGN_KMS_KEY: arn:aws:kms:eu-west-2:975050272416:key/0609d203-a4c9-4587-9618-71d6df4bcf82

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.DEV_GHA_DEPLOYER_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Install Cosign
        uses: sigstore/cosign-installer@main
        with:
          cosign-release: 'v1.9.0'

      - name: Build, tag, and push acceptance tests image to Amazon ECR
        env:
          CONTAINER_SIGN_KMS_KEY: ${{ env.CONTAINER_SIGN_KMS_KEY }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.DEV_ACCEPTANCE_ECR_REPO }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          cosign sign --key awskms:///${CONTAINER_SIGN_KMS_KEY} $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
