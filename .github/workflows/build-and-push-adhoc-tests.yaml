name: Build and push ad hoc acceptance tests

env:
  AWS_REGION: eu-west-2
  SELENIUM_BASE: selenium/standalone-chromium:148.0
  AD_HOC_DEV_ECR_REPO: dev-ad-hoc-tests-adhoctestrunnerimagerepository-ghvdzd2cyr46
  GHA_DEV_ROLE: arn:aws:iam::975050272416:role/authentication-api-pipeline-GitHubActionsRole-eoW45BhwCqWg

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        # TODO: staging option to be added after creating new github actions role for that environment
        options:
          - dev
          - build
      cucumber_tags:
        description: 'Cucumber tag(s) (optional)'
        required: false
        type: string

concurrency:
  group: "build-and-push-tests"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ env.GHA_DEV_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          target: auth-ad-hoc
          build-args: |
            SELENIUM_BASE=${{ env.SELENIUM_BASE }}
            AD_HOC_CUCUMBER_TAGS=${{ inputs.cucumber_tags }}
          tags: ${{ format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.AD_HOC_DEV_ECR_REPO, inputs.environment) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
