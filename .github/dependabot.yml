version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 100
    ignore:
      - dependency-name: "org.seleniumhq.selenium:selenium-java"
        versions: [ "> 4.11.0" ]
    groups:
      gradle-most-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "*selenium*"
    target-branch: main
    commit-message:
      prefix: BAU
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
    open-pull-requests-limit: 10
    groups:
      gha-all-dependencies:
        patterns:
          - "*"
    target-branch: main
    commit-message:
      prefix: BAU
